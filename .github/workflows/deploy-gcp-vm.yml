name: Deploy To GCP VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gcp-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_VM_SSH_PRIVATE_KEY }}

      - name: Add VM host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy latest code to VM
        run: |
          ssh "${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}" \
            "cd /opt/spark-airflow-aiven-local && sudo bash deploy/gcp/scripts/redeploy.sh"
